# Local development compose.
# This file intentionally starts only Qdrant.
services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: regulation-search-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
